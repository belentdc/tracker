<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Explorer — GIZ-SLOCAT Transport Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/design-tokens.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--ct-font);
  background: #fff;
  color: var(--ct-text);
}

.explorer {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1.25rem 2.5rem;
}

/* ── Search zone ─────────────────────────────────────────────────── */
.search-zone {
  background: var(--ct-green);
  border-radius: var(--ct-radius-lg);
  padding: 2rem 1.75rem 1.75rem;
  margin-bottom: 1.75rem;
}

.search-zone h2 {
  color: var(--ct-navy);
  font-size: 1.25rem;
  font-weight: 800;
  text-align: center;
  margin-bottom: 1.1rem;
  line-height: 1.3;
}

.search-wrap {
  position: relative;
  max-width: 480px;
  margin: 0 auto 1rem;
}

.search-input {
  width: 100%;
  padding: 0.75rem 2.5rem 0.75rem 1rem;
  font-family: var(--ct-font);
  font-size: 1rem;
  border: 2px solid transparent;
  border-radius: var(--ct-radius-md);
  background: #fff;
  color: var(--ct-text);
  transition: border-color 0.15s;
}
.search-input:focus { outline: none; border-color: var(--ct-navy); }
.search-input::placeholder { color: var(--ct-muted); }

.search-clear {
  position: absolute;
  right: 0.6rem; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--ct-muted); font-size: 1.2rem;
  line-height: 1; padding: 0.2rem 0.4rem;
  border-radius: 50%; display: none;
}
.search-clear:hover { color: var(--ct-navy); }
.search-clear.visible { display: block; }

.autocomplete-list {
  position: absolute;
  top: calc(100% + 4px); left: 0; right: 0;
  background: #fff;
  border: 1px solid var(--ct-border);
  border-radius: var(--ct-radius-md);
  box-shadow: var(--ct-shadow-md);
  max-height: 260px; overflow-y: auto;
  z-index: 100; display: none; list-style: none;
}
.autocomplete-list.open { display: block; }

.autocomplete-list li {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.6rem 0.9rem; cursor: pointer;
  font-size: 0.95rem; border-bottom: 1px solid var(--ct-border);
  transition: background 0.1s;
}
.autocomplete-list li:last-child { border-bottom: none; }
.autocomplete-list li:hover,
.autocomplete-list li[aria-selected="true"] { background: var(--ct-bg); }
.autocomplete-list li.no-result {
  color: var(--ct-muted); font-style: italic;
  cursor: default; justify-content: center;
}
.autocomplete-list mark {
  background: rgba(157,190,61,0.35);
  border-radius: 2px; padding: 0 1px;
}
.autocomplete-list img {
  width: 24px; height: 16px; object-fit: cover;
  border-radius: 2px; border: 1px solid var(--ct-border); flex-shrink: 0;
}

.suggestions-label {
  text-align: center; font-size: 0.78rem; font-weight: 700;
  color: var(--ct-navy); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 0.6rem; opacity: 0.75;
}

.suggestion-pills {
  display: flex; flex-wrap: wrap;
  justify-content: center; gap: 0.5rem;
}

.suggestion-pill {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.35rem 0.85rem;
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 999px; color: var(--ct-navy);
  font-family: var(--ct-font); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
}
.suggestion-pill:hover,
.suggestion-pill:focus-visible {
  background: var(--ct-navy); border-color: var(--ct-navy);
  color: #fff; outline: none;
}
.suggestion-pill img {
  width: 18px; height: 12px; object-fit: cover;
  border-radius: 2px; border: 1px solid rgba(0,0,0,0.1);
}

/* ── Zone 2 + 3: side-by-side row ───────────────────────────────── */
.explore-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  align-items: start;
}
@media (max-width: 760px) { .explore-row { grid-template-columns: 1fr; } }

.zone-label {
  font-size: 0.78rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--ct-muted); margin-bottom: 0.75rem;
}

/* Zone 2: recently updated countries */
.recent-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
@media (max-width: 480px) { .recent-list { grid-template-columns: 1fr; } }

.featured-card {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: 0.4rem;
  width: 100%; max-width: 150px; aspect-ratio: 1 / 1; margin: 0 auto;
  text-decoration: none;
  background: var(--ct-surface); border: 1px solid var(--ct-border);
  border-radius: var(--ct-radius-md); padding: 0.75rem 0.5rem;
  box-shadow: var(--ct-shadow-sm);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  position: relative; overflow: hidden;
}
.featured-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--ct-green);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.2s;
}
.featured-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--ct-shadow-md);
  border-color: var(--ct-green);
}
.featured-card:hover::before { transform: scaleX(1); }

.featured-card-top {
  display: flex; flex-direction: column; align-items: center;
  gap: 0.35rem;
}
.featured-card-top .f-badge-doctype { margin-left: 0; }

.featured-flag {
  width: 28px; height: 19px; object-fit: cover;
  border-radius: 3px; border: 1px solid var(--ct-border); flex-shrink: 0;
}

.featured-name {
  font-weight: 700; font-size: 0.85rem;
  color: var(--ct-navy); line-height: 1.2;
}

.featured-date {
  font-size: 0.72rem; color: var(--ct-muted); line-height: 1.3;
}

.featured-stats { display: flex; flex-wrap: wrap; gap: 0.35rem; }

.f-badge {
  font-size: 0.71rem; border-radius: 999px;
  padding: 0.15rem 0.55rem; white-space: nowrap; border: 1px solid;
}
.f-badge-measures {
  background: rgba(157,190,61,0.15); border-color: rgba(157,190,61,0.5);
  color: var(--ct-navy); font-weight: 700;
}
.f-badge-target {
  background: rgba(0,164,189,0.1); border-color: rgba(0,164,189,0.4);
  color: var(--ct-navy);
}
.f-badge-doctype {
  font-weight: 700; letter-spacing: 0.03em;
}
.f-badge-doctype-NDC {
  background: rgba(0,61,92,0.08); border-color: rgba(0,61,92,0.3);
  color: var(--ct-navy);
}
.f-badge-doctype-LTS {
  background: rgba(157,190,61,0.15); border-color: rgba(157,190,61,0.5);
  color: var(--ct-green-dark);
}
.f-badge-neutral {
  background: var(--ct-bg); border-color: var(--ct-border); color: var(--ct-text);
}

.skeleton {
  background: linear-gradient(90deg, var(--ct-border) 25%, var(--ct-bg) 50%, var(--ct-border) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
  border-radius: var(--ct-radius-md);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Zone 3: keyword search widget */
.qs-card {
  background: var(--ct-surface); border: 1px solid var(--ct-border);
  border-radius: var(--ct-radius-lg, 14px); padding: 1.1rem 1.25rem;
  box-shadow: var(--ct-shadow-sm);
}
.qs-input {
  width: 100%; padding: 0.65rem 0.9rem; font-family: var(--ct-font); font-size: 0.95rem;
  border: 2px solid var(--ct-border); border-radius: var(--ct-radius-md);
  background: #fff; color: var(--ct-text); transition: border-color 0.15s;
}
.qs-input:focus { outline: none; border-color: var(--ct-teal, #00A4BD); }
.qs-status { font-size: 0.78rem; color: var(--ct-muted); margin-top: 0.5rem; min-height: 1.1em; }
.qs-results { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.4rem; }
.qs-result {
  display: block; text-decoration: none; color: inherit;
  border: 1px solid var(--ct-border); border-radius: var(--ct-radius-md);
  padding: 0.55rem 0.75rem; transition: border-color 0.15s;
}
.qs-result:hover { border-color: var(--ct-teal, #00A4BD); }
.qs-kind {
  display: inline-block; font-size: 0.68rem; font-weight: 700;
  border-radius: 999px; padding: 0.05rem 0.5rem; margin-bottom: 0.25rem;
  text-transform: uppercase; letter-spacing: 0.03em;
}
.qs-kind-country { background: rgba(157,190,61,0.15); color: var(--ct-green-dark); }
.qs-kind-target { background: rgba(0,61,92,0.1); color: var(--ct-navy); }
.qs-kind-measure { background: rgba(0,164,189,0.12); color: #007a8d; }
.qs-kind-adaptation { background: rgba(232,130,26,0.14); color: var(--ct-orange); }
.qs-result-text { font-size: 0.88rem; font-weight: 400; color: var(--ct-text); line-height: 1.35; }
.qs-result-text mark { background: rgba(157,190,61,.35); color: inherit; padding: 0 .1em; border-radius: 2px; }
.qs-result-meta { font-size: 0.75rem; color: var(--ct-muted); margin-top: 0.1rem; }
.qs-footer { margin-top: 0.7rem; padding-top: 0.6rem; border-top: 1px solid var(--ct-border); display: flex; flex-direction: column; gap: 0.35rem; }
.qs-link { font-size: 0.85rem; font-weight: 700; color: var(--ct-teal, #00A4BD); text-decoration: none; }
.qs-link:hover { text-decoration: underline; }
.qs-link-secondary { font-size: 0.8rem; font-weight: 600; color: var(--ct-navy); text-decoration: none; }
.qs-link-secondary:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="explorer">

  <!-- ── Zone 1: Search ─────────────────────────────────────────── -->
  <div class="search-zone">
    <h2>Explore transport climate commitments by country</h2>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="search-input"
        placeholder="Type a country name…" autocomplete="off"
        aria-label="Search countries" role="combobox"
        aria-autocomplete="list" aria-expanded="false"
        aria-controls="autocompleteList" />
      <button type="button" class="search-clear" id="searchClear" aria-label="Clear search">×</button>
      <ul id="autocompleteList" class="autocomplete-list" role="listbox"></ul>
    </div>
    <p class="suggestions-label">Not sure where to start?</p>
    <div class="suggestion-pills" id="suggestionPills"></div>
  </div>

  <!-- ── Zone 2 + 3: Recently updated & Search by keyword ─────────── -->
  <div class="explore-row">

    <div class="recent-zone">
      <p class="zone-label">Recently updated commitments</p>
      <div class="recent-list" id="featuredGrid">
        <div style="aspect-ratio:1/1;max-width:150px;margin:0 auto;width:100%;" class="skeleton"></div>
        <div style="aspect-ratio:1/1;max-width:150px;margin:0 auto;width:100%;" class="skeleton"></div>
        <div style="aspect-ratio:1/1;max-width:150px;margin:0 auto;width:100%;" class="skeleton"></div>
      </div>
    </div>

    <div class="search-zone-qs">
      <p class="zone-label">Search by keyword</p>
      <div class="qs-card">
        <input type="text" id="qsInput" class="qs-input" placeholder="Search targets, measures, countries…" autocomplete="off">
        <p class="qs-status" id="qsStatus"></p>
        <div class="qs-results" id="qsResults"></div>
        <div class="qs-footer" id="qsFooter" hidden>
          <a href="#" id="qsSeeAll" class="qs-link"></a>
          <a href="../search/" id="qsOpenFull" class="qs-link-secondary">Open full search →</a>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
(function () {
"use strict";

const INDEX_URL   = "data/countries/index.json";
const PROFILE_URL = (code) => "country.html?country=" + encodeURIComponent(code);
const FLAG_LOCAL  = (iso2) => "../assets/flags/" + iso2 + ".png";
const FLAG_CDN    = (iso2) => "https://flagcdn.com/w80/" + iso2 + ".png";
const NUM_PILLS   = 5;

const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
    (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const normalize = (s) =>
    (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();

function flagImg(iso2, cls) {
    if (!iso2) return "";
    return `<img class="${cls}" src="${FLAG_LOCAL(iso2)}"
        onerror="this.onerror=null;this.src='${FLAG_CDN(iso2)}'" alt="" loading="lazy">`;
}

function highlight(text, query) {
    const t = String(text ?? "");
    const normT = normalize(t), normQ = normalize(query);
    const i = normT.indexOf(normQ);
    if (i === -1) return esc(t);
    return esc(t.slice(0,i)) + "<mark>" + esc(t.slice(i,i+query.length)) + "</mark>" + esc(t.slice(i+query.length));
}

function pickRandom(list, n) {
    const a = [...list];
    for (let i = 0; i < Math.min(n, a.length); i++) {
        const j = i + Math.floor(Math.random() * (a.length - i));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a.slice(0, n);
}

let ALL = [];

fetch(INDEX_URL)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(idx => {
        ALL = idx.countries;
        initSearch();
        initFeatured();
    })
    .catch(() => {
        document.getElementById("featuredGrid").innerHTML =
            `<p style="color:var(--ct-muted);font-style:italic;">Could not load country data.</p>`;
    });

/* ── Zone 1: Search ──────────────────────────────────────────────── */
function initSearch() {
    const input    = document.getElementById("searchInput");
    const clearBtn = document.getElementById("searchClear");
    const list     = document.getElementById("autocompleteList");
    const pills    = document.getElementById("suggestionPills");

    let activeIdx = -1, current = [], timer = null;

    const withContent = ALL.filter(c => c.has_transport_content && c.iso2);
    pills.innerHTML = pickRandom(withContent, NUM_PILLS).map(c => `
        <button class="suggestion-pill" data-code="${esc(c.code)}" aria-label="Explore ${esc(c.name)}">
          ${flagImg(c.iso2, "")}
          <span>${esc(c.name)}</span>
        </button>`).join("");
    pills.querySelectorAll(".suggestion-pill").forEach(btn =>
        btn.addEventListener("click", () => { location.href = PROFILE_URL(btn.dataset.code); }));

    function render(items, query) {
        activeIdx = -1;
        list.innerHTML = !items.length
            ? `<li class="no-result">No countries found</li>`
            : items.slice(0,20).map((c,i) => `
                <li id="ac-opt-${i}" role="option" aria-selected="false" data-code="${esc(c.code)}">
                  ${flagImg(c.iso2,"")}
                  <span>${highlight(c.name, query)}</span>
                </li>`).join("");
        list.querySelectorAll("li[role='option']").forEach((li,i) => {
            li.addEventListener("mouseenter", () => setActive(i));
            li.addEventListener("click", () => { location.href = PROFILE_URL(li.dataset.code); hide(); });
        });
        list.classList.add("open");
        input.setAttribute("aria-expanded","true");
    }

    function setActive(i) {
        list.querySelectorAll("li[role='option']").forEach(o => o.setAttribute("aria-selected","false"));
        const opts = list.querySelectorAll("li[role='option']");
        if (i >= 0 && i < opts.length) opts[i].setAttribute("aria-selected","true");
        activeIdx = i;
    }

    function hide() {
        list.classList.remove("open");
        input.setAttribute("aria-expanded","false");
        activeIdx = -1;
    }

    input.addEventListener("input", () => {
        clearBtn.classList.toggle("visible", !!input.value);
        clearTimeout(timer);
        timer = setTimeout(() => {
            const q = input.value.trim();
            if (!q) { hide(); return; }
            current = ALL.filter(c => normalize(c.name).includes(normalize(q)));
            render(current, q);
        }, 120);
    });

    input.addEventListener("keydown", e => {
        const opts = list.querySelectorAll("li[role='option']");
        if (e.key==="ArrowDown") { setActive((activeIdx+1)%opts.length); e.preventDefault(); }
        else if (e.key==="ArrowUp") { setActive((activeIdx-1+opts.length)%opts.length); e.preventDefault(); }
        else if (e.key==="Enter") {
            const t = activeIdx>=0 ? current[activeIdx] : current[0];
            if (t) { location.href = PROFILE_URL(t.code); hide(); }
        }
        else if (e.key==="Escape") hide();
    });

    clearBtn.addEventListener("click", () => {
        input.value=""; clearBtn.classList.remove("visible"); hide(); input.focus();
    });
    document.addEventListener("click", e => {
        if (!e.target.closest(".search-wrap")) hide();
    });
}

/* ── Zone 2: Recently updated ───────────────────────────────────── */
function initFeatured() {
    const grid = document.getElementById("featuredGrid");

    const eligible = ALL.filter(c => c.latest_active_document && c.latest_active_document.date);
    const featured = [...eligible]
        .sort((a, b) => b.latest_active_document.date.localeCompare(a.latest_active_document.date))
        .slice(0, 3);
    if (!featured.length) { grid.innerHTML = ""; return; }

    const dateLabel = (iso) => {
        const d = new Date(iso + "T00:00:00");
        return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
    };
    const typeLabel = (t) => t === "LTS" ? "Long-term strategy" : t;

    grid.innerHTML = featured.map(c => {
        const doc = c.latest_active_document;
        return `
        <a class="featured-card" href="${esc(PROFILE_URL(c.code))}" aria-label="Explore ${esc(c.name)}">
          <div class="featured-card-top">
            ${flagImg(c.iso2, "featured-flag")}
            <span class="featured-name">${esc(c.name)}</span>
            <span class="f-badge f-badge-doctype f-badge-doctype-${esc(doc.type)}">${esc(doc.type)}</span>
          </div>
          <p class="featured-date">${esc(typeLabel(doc.type))} · analysed ${dateLabel(doc.date)}</p>
        </a>`;
    }).join("");
    sendHeight();
}

/* ── Zone 3: Search by keyword ──────────────────────────────────── */
function initQuickSearch() {
    const SEARCH_INDEX_URL = "../data/processed/search-index.json";
    const input   = document.getElementById("qsInput");
    const status  = document.getElementById("qsStatus");
    const results = document.getElementById("qsResults");
    const footer  = document.getElementById("qsFooter");
    const seeAll  = document.getElementById("qsSeeAll");

    let data = null, loading = false, timer = null;

    const kindLabel = { country: "Country", target: "Target", measure: "Measure", adaptation: "Adaptation" };

    function ensureData(cb) {
        if (data) { cb(); return; }
        if (loading) return;
        loading = true;
        status.textContent = "Loading search index…";
        fetch(SEARCH_INDEX_URL)
            .then(r => { if (!r.ok) throw new Error("bad response"); return r.json(); })
            .then(json => { data = json.entries || []; loading = false; status.textContent = ""; cb(); })
            .catch(() => { loading = false; status.textContent = "Could not load search index."; });
    }

    const highlight = (text, term) => {
        let out = esc(text);
        const t = term.trim().replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        if (t) out = out.replace(new RegExp("(" + t + ")", "gi"), "<mark>$1</mark>");
        return out;
    };

    function render(term) {
        const t = normalize(term);
        const matches = data.filter(e =>
            (e.text && normalize(e.text).includes(t)) ||
            (e.country && normalize(e.country).includes(t)) ||
            (e.category && normalize(e.category).includes(t))
        );

        status.textContent = matches.length + " result" + (matches.length === 1 ? "" : "s");
        results.innerHTML = matches.slice(0, 3).map(e => `
            <a class="qs-result" href="../${esc(e.url)}" target="_blank" rel="noopener">
              <span class="qs-kind qs-kind-${esc(e.kind)}">${esc(kindLabel[e.kind] || e.kind)}</span>
              <div class="qs-result-text">${highlight(e.text || e.country, term)}</div>
              <div class="qs-result-meta">${esc(e.country || "")}${e.category ? " · " + esc(e.category) : ""}</div>
            </a>`).join("");

        if (matches.length) {
            footer.hidden = false;
            seeAll.href = "../search/?q=" + encodeURIComponent(term);
            seeAll.textContent = `See all ${matches.length} results for "${term}" →`;
        } else {
            footer.hidden = false;
            seeAll.href = "../search/?q=" + encodeURIComponent(term);
            seeAll.textContent = `Open full search for "${term}" →`;
        }
    }

    input.addEventListener("input", () => {
        const term = input.value.trim();
        clearTimeout(timer);
        if (term.length < 2) {
            results.innerHTML = ""; status.textContent = ""; footer.hidden = true;
            return;
        }
        timer = setTimeout(() => ensureData(() => render(term)), 300);
    });
}
initQuickSearch();

/* ── iframe height ───────────────────────────────────────────────── */
function sendHeight() {
    window.parent.postMessage({ type: "ndcTrackerHeight", height: document.body.scrollHeight }, "*");
}
function sendHeightDebounced() {
    clearTimeout(window._sendHeightTimer);
    window._sendHeightTimer = setTimeout(sendHeight, 150);
}
sendHeight();
window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeightDebounced);
new ResizeObserver(sendHeightDebounced).observe(document.body);

})();
</script>
</body>
</html>
