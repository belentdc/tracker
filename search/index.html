<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — GIZ-SLOCAT NDC Transport Tracker</title>
<meta name="description" content="Search every transport target and measure across all NDCs in the GIZ-SLOCAT Transport Tracker.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/design-tokens.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--ct-font, 'Source Sans 3', sans-serif); background: var(--ct-bg, #F4F6F8); color: var(--ct-text, #2C3E50); }
.wrap { max-width: 1150px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
.kicker { font-size: .8rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ct-teal, #00A4BD); }
h1 { font-size: 1.7rem; font-weight: 800; color: var(--ct-navy, #003D5C); margin: .25rem 0 .35rem; }
.sub { font-size: .95rem; color: var(--ct-muted, #6B7280); margin-bottom: 1.4rem; }
.searchbox { display:flex; gap:.5rem; }
.searchbox input {
  flex:1; padding: .8rem 1rem; font-family: inherit; font-size: 1rem;
  border: 2px solid var(--ct-border, #E1E4E8); border-radius: 10px; background: #fff; color: inherit;
}
.searchbox input:focus { outline: none; border-color: var(--ct-teal, #00A4BD); }
.filters { display:flex; gap:.4rem; flex-wrap:wrap; margin:.8rem 0 .4rem; align-items:center; }
.f-label { font-size:.75rem; font-weight:700; color:var(--ct-muted,#6B7280); margin-right:.1rem; }
.chip {
  padding:.3rem .8rem; border:1px solid var(--ct-border,#E1E4E8); border-radius:999px;
  background:#fff; color:var(--ct-muted,#6B7280); font-family:inherit; font-size:.8rem; font-weight:600; cursor:pointer;
}
.chip.on { background: var(--ct-navy,#003D5C); border-color: var(--ct-navy,#003D5C); color:#fff; }

/* Country filter */
.cfilter { position:relative; display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; margin:.35rem 0 .6rem; }
.cfilter input {
  padding:.35rem .8rem; font-family:inherit; font-size:.85rem; min-width:220px;
  border:1px solid var(--ct-border,#E1E4E8); border-radius:999px; background:#fff; color:inherit;
}
.cfilter input:focus { outline:none; border-color: var(--ct-teal,#00A4BD); }
.ctoken {
  display:inline-flex; align-items:center; gap:.35rem;
  padding:.25rem .4rem .25rem .7rem; border-radius:999px;
  background:rgba(0,164,189,.12); color:#007a8d; font-size:.8rem; font-weight:700;
}
.ctoken button { border:none; background:transparent; color:inherit; cursor:pointer; font-size:.85rem; line-height:1; padding:.05rem .25rem; border-radius:50%; }
.ctoken button:hover { background:rgba(0,0,0,.08); }
.cdrop {
  position:absolute; top:calc(100% + .3rem); left:0; z-index:40;
  width:280px; max-height:260px; overflow-y:auto;
  background:#fff; border:1px solid var(--ct-border,#E1E4E8); border-radius:10px;
  box-shadow:0 12px 32px rgba(0,0,0,.16); display:none;
}
.cdrop.open { display:block; }
.cdrop-item { display:flex; align-items:center; gap:.5rem; padding:.4rem .7rem; cursor:pointer; font-size:.85rem; }
.cdrop-item:hover { background:var(--ct-bg,#F4F6F8); }
.cdrop-empty { padding:.7rem; color:var(--ct-muted,#6B7280); font-size:.82rem; }

/* Theme explorer */
.themes { margin:1.2rem 0 .5rem; }
.themes-title { font-size:.8rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ct-muted,#6B7280); margin-bottom:.55rem; }
.themes-row { display:flex; gap:.4rem; flex-wrap:wrap; }

.meta { font-size:.82rem; color:var(--ct-muted,#6B7280); margin-bottom:.8rem; }
.result { background:#fff; border:1px solid var(--ct-border,#E1E4E8); border-radius:12px; padding: .9rem 1.1rem; margin-bottom:.7rem; }
.r-top { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-bottom:.3rem; }
.r-country { font-weight:700; color: var(--ct-navy,#003D5C); text-decoration:none; }
.r-country:hover { color: var(--ct-teal,#00A4BD); }
.badge { font-size:.68rem; font-weight:700; padding:.1rem .5rem; border-radius:999px; text-transform:uppercase; letter-spacing:.04em; }
.badge.target { background:rgba(0,61,92,.1); color:#003D5C; }
.badge.measure { background:rgba(0,164,189,.12); color:#007a8d; }
.badge.adaptation { background:rgba(157,190,61,.18); color:#5c7522; }
.badge.country { background:rgba(232,130,26,.14); color:#b05f0d; }
.r-meta { font-size:.74rem; color:var(--ct-muted,#6B7280); }
.r-text { font-size:.9rem; line-height:1.45; }
.r-text mark { background: rgba(157,190,61,.35); padding:0 .1em; border-radius:2px; }
.r-cat { font-size:.76rem; color:var(--ct-teal,#00A4BD); font-weight:700; margin-top:.25rem; }
.empty { text-align:center; color:var(--ct-muted,#6B7280); padding:3rem 0; font-size:.95rem; }
.more { display:block; width:100%; margin-top:.5rem; padding:.6rem; border:1px dashed var(--ct-border,#E1E4E8); border-radius:10px; background:transparent; color:var(--ct-teal,#00A4BD); font-family:inherit; font-size:.85rem; font-weight:700; cursor:pointer; }
footer { margin-top:2.5rem; font-size:.78rem; color:var(--ct-muted,#6B7280); }
footer a { color: var(--ct-teal,#00A4BD); }
</style>
<!-- Matomo -->
<script>
  var _paq = window._paq = window._paq || [];
  /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  (function() {
    var u="https://analytics.sutp.org/";
    _paq.push(['setTrackerUrl', u+'matomo.php']);
    _paq.push(['setSiteId', '16']);
    var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
    g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
  })();
</script>
<!-- End Matomo Code -->
</head>
<body>
<div class="wrap">
  <p class="sub">Try <em>rail freight</em>, <em>bus electrification</em>, or pick a theme below. Includes every NDC generation submitted so far, both active and archived.</p>

  <div class="searchbox"><input id="q" type="search" placeholder="Search targets and measures…" autofocus autocomplete="off"></div>

  <div class="filters" id="filters">
    <button class="chip on" data-kind="all">All</button>
    <button class="chip" data-kind="target">Targets</button>
    <button class="chip" data-kind="measure">Mitigation measures</button>
    <button class="chip" data-kind="adaptation">Adaptation measures</button>
  </div>

  <div class="filters" id="status-filters">
    <button class="chip on" data-status="all">All generations</button>
    <button class="chip" data-status="active">Active only</button>
    <button class="chip" data-status="archived">Archived only</button>
  </div>

  <div class="cfilter" id="cfilter">
    <span class="f-label">Filter by country:</span>
    <span id="ctokens"></span>
    <span style="position:relative;">
      <input id="cq" type="text" placeholder="Add a country…" autocomplete="off">
      <div class="cdrop" id="cdrop"></div>
    </span>
  </div>

  <div class="themes" id="themes" hidden>
    <div class="themes-title">Or explore by theme</div>
    <div class="themes-row" id="themes-row"></div>
  </div>

  <div class="meta" id="meta"></div>
  <div id="results"><div class="empty">Loading index…</div></div>
</div>

<script>
(function(){
  const PAGE=30;
  let INDEX=[], COUNTRIES=[], kind='all', theme=null, status='all', shown=PAGE;
  let selected=[]; // [{code,name}]
  const $q=document.getElementById('q'), $r=document.getElementById('results'), $m=document.getElementById('meta');
  const $cq=document.getElementById('cq'), $cdrop=document.getElementById('cdrop'), $ctokens=document.getElementById('ctokens');

  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const norm=s=>String(s??'').toLowerCase();

  fetch('../data/processed/search-index.json')
    .then(r=>{ if(!r.ok) throw 0; return r.json(); })
    .then(d=>{ INDEX=d.entries||[];
      COUNTRIES=INDEX.filter(e=>e.kind==='country')
        .map(e=>({code:e.code,name:e.country}))
        .sort((a,b)=>a.name.localeCompare(b.name));
      buildThemes();
      const sp=new URLSearchParams(location.search);
      const pre=sp.get('q'); if(pre){ $q.value=pre; }
      const pc=(sp.get('country')||'').toUpperCase();
      if(pc){ const c=COUNTRIES.find(x=>x.code===pc); if(c) selected.push(c); drawTokens(); }
      $m.textContent=INDEX.length.toLocaleString()+' entries indexed, updated '+(d.generated||'');
      run(); })
    .catch(()=>{ $r.innerHTML='<div class="empty">Could not load the search index. Run <code>python pipeline/build_search_index.py</code> after the data pipeline.</div>'; });

  /* ── Theme explorer: top categories computed from the live index ── */
  function buildThemes(){
    const counts={};
    INDEX.forEach(e=>{ if(e.category && e.kind!=='country'){ counts[e.category]=(counts[e.category]||0)+1; } });
    const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if(!top.length) return;
    document.getElementById('themes').hidden=false;
    document.getElementById('themes-row').innerHTML=top.map(([c])=>
      '<button class="chip" data-theme="'+esc(c)+'">'+esc(c)+'</button>').join('');
    document.getElementById('themes-row').addEventListener('click',e=>{
      const b=e.target.closest('.chip'); if(!b) return;
      theme = (theme===b.dataset.theme) ? null : b.dataset.theme;
      document.querySelectorAll('#themes-row .chip').forEach(t=>t.classList.toggle('on',t.dataset.theme===theme));
      shown=PAGE; run();
    });
  }

  /* ── Active/archived filter ── */
  document.getElementById('status-filters').addEventListener('click',e=>{
    const b=e.target.closest('.chip'); if(!b) return;
    status=b.dataset.status;
    document.querySelectorAll('#status-filters .chip').forEach(c=>c.classList.toggle('on',c===b));
    shown=PAGE; run();
  });

  /* ── Country multi-select ── */
  function drawTokens(){
    $ctokens.innerHTML=selected.map(c=>
      '<span class="ctoken">'+esc(c.name)+'<button data-code="'+esc(c.code)+'" aria-label="Remove '+esc(c.name)+'">\u2715</button></span>').join('');
    $ctokens.querySelectorAll('button').forEach(b=>b.onclick=()=>{
      selected=selected.filter(c=>c.code!==b.dataset.code); drawTokens(); shown=PAGE; run();
    });
  }
  function drawDrop(){
    const q=norm($cq.value).trim();
    if(!q){ $cdrop.classList.remove('open'); return; }
    const pool=COUNTRIES.filter(c=>norm(c.name).includes(q)&&!selected.some(s=>s.code===c.code));
    const list=[...pool.filter(c=>norm(c.name).startsWith(q)),...pool.filter(c=>!norm(c.name).startsWith(q))].slice(0,12);
    $cdrop.innerHTML=list.length
      ?list.map(c=>'<div class="cdrop-item" data-code="'+esc(c.code)+'">'+esc(c.name)+'</div>').join('')
      :'<div class="cdrop-empty">No countries match.</div>';
    $cdrop.classList.add('open');
    $cdrop.querySelectorAll('.cdrop-item').forEach(it=>it.onclick=()=>{
      const c=COUNTRIES.find(x=>x.code===it.dataset.code);
      if(c){ selected.push(c); drawTokens(); }
      $cq.value=''; $cdrop.classList.remove('open'); shown=PAGE; run();
    });
  }
  $cq.addEventListener('input',drawDrop);
  document.addEventListener('click',e=>{ if(!e.target.closest('#cfilter')) $cdrop.classList.remove('open'); });

  function tokens(q){ return norm(q).split(/\s+/).filter(t=>t.length>1); }

  function score(e,ts){
    const hay = norm(e.text)+' '+norm(e.extra||'')+' '+norm(e.category||'')+' '+norm(e.country||'');
    let s=0;
    for(const t of ts){ if(!hay.includes(t)) return 0; s += (norm(e.text).includes(t)?3:1); if(norm(e.country).includes(t)) s+=2; }
    if(e.status==='Active') s+=1;
    return s;
  }

  function highlight(text,ts){
    let out=esc(text);
    for(const t of ts){ out=out.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>'); }
    return out;
  }

  function baseList(){
    let list=INDEX;
    if(selected.length){ const set=new Set(selected.map(c=>c.code)); list=list.filter(e=>set.has(e.code)); }
    if(status!=='all') list=list.filter(e=>norm(e.status)===status);
    if(theme) list=list.filter(e=>e.category===theme);
    return list;
  }

  function updatePillCounts(list){
    document.querySelectorAll('#filters .chip').forEach(ch=>{
      const k=ch.dataset.kind;
      const base=k==='all'?list.filter(e=>e.kind!=='country'):list.filter(e=>e.kind===k);
      const label={all:'All',target:'Targets',measure:'Mitigation measures',adaptation:'Adaptation measures'}[k];
      ch.textContent=(list===INDEX)?label:label+' ('+base.length.toLocaleString()+')';
    });
  }

  /* Theme counts always reflect the current search/kind/status/country filters,
     but never the currently active theme itself (so you can compare themes). */
  function updateThemeCounts(q,ts){
    let list=INDEX;
    if(selected.length){ const set=new Set(selected.map(c=>c.code)); list=list.filter(e=>set.has(e.code)); }
    if(status!=='all') list=list.filter(e=>norm(e.status)===status);
    list=kind!=='all' ? list.filter(e=>e.kind===kind) : list.filter(e=>e.kind!=='country');
    if(ts.length) list=list.filter(e=>score(e,ts)>0);
    const counts={};
    list.forEach(e=>{ if(e.category){ counts[e.category]=(counts[e.category]||0)+1; } });
    document.querySelectorAll('#themes-row .chip').forEach(ch=>{
      const c=ch.dataset.theme;
      ch.textContent=c+' ('+(counts[c]||0).toLocaleString()+')';
    });
  }

  function run(){
    const q=$q.value.trim(), ts=tokens(q);
    const active=q||theme||selected.length||status!=='all';
    let list=baseList();
    updatePillCounts(active?(ts.length?list.map(e=>[score(e,ts),e]).filter(x=>x[0]>0).map(x=>x[1]):list):INDEX);
    updateThemeCounts(q,ts);
    if(kind!=='all') list=list.filter(e=>e.kind===kind);
    else if(theme||selected.length||status!=='all') list=list.filter(e=>e.kind!=='country');
    if(ts.length){ list=list.map(e=>[score(e,ts),e]).filter(x=>x[0]>0).sort((a,b)=>b[0]-a[0]).map(x=>x[1]); }
    else if(!active){ list=[]; }

    if(!active){ $r.innerHTML='<div class="empty">Type to search '+INDEX.length.toLocaleString()+' entries, or pick a theme above.</div>'; $m.textContent=''; return; }
    if(!list.length){ $r.innerHTML='<div class="empty">No matches'+(q?' for \u201c'+esc(q)+'\u201d':'')+'.</div>'; $m.textContent='0 results'; return; }

    const view=list.slice(0,shown);
    $r.innerHTML = view.map(e=>{
      const link = e.url ? '<a class="r-country" href="../'+esc(e.url)+'" target="_blank" rel="noopener">'+esc(e.country)+'</a>' : '<span class="r-country">'+esc(e.country)+'</span>';
      const meta = [e.gen,e.version,e.status].filter(Boolean).join(', ');
      return '<div class="result"><div class="r-top">'+link+
        '<span class="badge '+esc(e.kind)+'">'+esc(e.kind)+'</span>'+
        (meta?'<span class="r-meta">'+esc(meta)+'</span>':'')+'</div>'+
        (e.kind!=='country'?'<div class="r-text">'+highlight(e.text,ts)+'</div>':'')+
        (e.category?'<div class="r-cat">'+esc(e.category)+'</div>':'')+
        '</div>';
    }).join('') + (list.length>shown?'<button class="more" id="more">Show more ('+(list.length-shown)+' remaining)</button>':'');
    const mb=document.getElementById('more'); if(mb) mb.onclick=()=>{shown+=PAGE;run();};

    const parts=[];
    if(q) parts.push('\u201c'+q+'\u201d');
    if(theme) parts.push('theme: '+theme);
    if(status!=='all') parts.push(status==='active'?'active only':'archived only');
    if(selected.length) parts.push('showing results for '+selected.map(c=>c.name).join(', '));
    $m.textContent=list.length.toLocaleString()+' result'+(list.length===1?'':'s')+(parts.length?' \u2014 '+parts.join(' \u00b7 '):'');
  }

  let deb; $q.addEventListener('input',()=>{shown=PAGE;clearTimeout(deb);deb=setTimeout(run,180);});
  document.getElementById('filters').addEventListener('click',e=>{
    const b=e.target.closest('.chip'); if(!b) return;
    document.querySelectorAll('#filters .chip').forEach(c=>c.classList.remove('on'));
    b.classList.add('on'); kind=b.dataset.kind; shown=PAGE; run();
  });

  // iframe auto-resize — sends height to WordPress parent
  function sendHeight() {
    const height = document.body.scrollHeight;
    window.parent.postMessage({ type: 'ndcTrackerHeight', height }, '*');
  }
  function sendHeightDebounced() {
    clearTimeout(window._sendHeightTimer);
    window._sendHeightTimer = setTimeout(sendHeight, 150);
  }
  sendHeight();
  window.addEventListener('resize', sendHeightDebounced);
  new ResizeObserver(sendHeightDebounced).observe(document.body);
})();
</script>
</body>
</html>
